#version: "3.9"

services:
  minio:
    image: minio/minio
    container_name: minio
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - bookstore-network
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    networks:
      - bookstore-network

  redis:
    image: redis:7-alpine
    container_name: redis
    volumes:
      - redis_data:/data
    networks:
      - bookstore-network

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    volumes:
      - sql_data:/var/opt/mssql
    networks:
      - bookstore-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: keycloak
    command: start-dev --http-port=8080 --import-realm
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./Client/apps/realms:/opt/keycloak/data/import:ro
    networks:
      - bookstore-network

  bookstore.basket:
    build:
      context: .
      dockerfile: Services/Basket/BookStore.Basket/Dockerfile
    depends_on:
      - sqlserver
      - rabbitmq
    networks:
      - bookstore-network

  bookstore.catalog:
    build:
      context: .
      dockerfile: Services/Catalog/BookStore.Catalog/Dockerfile
    depends_on:
      - sqlserver
      - rabbitmq
      - redis
    networks:
      - bookstore-network

  bookstore.gateway:
    build:
      context: .
      dockerfile: ApiGateWays/BookStore.Gateway/Dockerfile
    depends_on:
      - bookstore.basket
      - bookstore.catalog
      - keycloak
    networks:
      - bookstore-network

volumes:
  sql_data:
  minio_data:
  redis_data:
  keycloak_data:

networks:
  bookstore-network:
    driver: bridge